        .meaning-box { font-size: 1.3rem; font-weight: bold; line-height: 1.5; margin-bottom: 30px; color: #14171a; text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; }

        input[type="text"] { width: 80%; padding: 12px; font-size: 1.1rem; border: 2px solid #e1e8ed; border-radius: 8px; outline: none; }
        input[type="text"]:focus { border-color: var(--accent-color); }
        
        .msg { margin-top: 15px; height: 24px; font-size: 0.95rem; font-weight: bold; }
        .hint { color: #f45d48; }
        .correct { color: #17bf63; }
        .error { color: #e0245e; }

        .mode-btn { position: absolute; bottom: 20px; right: 20px; padding: 10px 15px; background: var(--accent-color); color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: opacity 0.2s; }

        .mode-btn.all-mode { background: #657786; }
    </style>
</head>

    let currentMode = "all"; // "all" or "wrong"
    let wrongWords = [];
    let currentQuestion = null;
    let missCount = 0;

    const idEl = document.getElementById('word-id');
    const meaningEl = document.getElementById('meaning');
    const inputEl = document.getElementById('answer-input');
    const messageEl = document.getElementById('message');
    const counterEl = document.getElementById('counter');
    const modeBtn = document.getElementById('mode-toggle');

    function nextQuestion() {
        missCount = 0;
        messageEl.textContent = "";
        inputEl.value = "";
        
        let targetList = currentMode === "all" ? allWords : wrongWords;
        
        if (currentMode === "wrong") {
            if (targetList.length === 0) {
                meaningEl.textContent = "🎉 クリア！すべての間違いを克服しました！";
                counterEl.textContent = "残り 0 問";
                setTimeout(() => toggleMode(), 2000);
                return;
            }
            counterEl.textContent = `残り ${targetList.length} 問`;
        } else {
            counterEl.textContent = "";
        }

        const randomIndex = Math.floor(Math.random() * targetList.length);
        currentQuestion = targetList[randomIndex];
        
        idEl.textContent = currentQuestion.id;
        meaningEl.textContent = currentQuestion.meaning;
        inputEl.focus();
    }

    function toggleMode() {
        if (currentMode === "all") {
            if (wrongWords.length === 0) {
                alert("まだ間違えた問題がありません。まずは通常モードで解いてみましょう！");
                return;
            }
            currentMode = "wrong";
            document.body.classList.add('wrong-mode');
            modeBtn.textContent = "すべての単語を学習する";
            modeBtn.classList.add('all-mode');
        } else {
            currentMode = "all";
            document.body.classList.remove('wrong-mode');
            modeBtn.textContent = "間違えた問題を学習";
            modeBtn.classList.remove('all-mode');
        }
        nextQuestion();
    }

    inputEl.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const userAnswer = inputEl.value.trim();
            if (userAnswer === currentQuestion.word) {
                // 正解
                messageEl.textContent = "正解！";
                messageEl.className = "msg correct";
                
                if (currentMode === "wrong") {
                    // 間違えたリストから削除
                    wrongWords = wrongWords.filter(w => w.id !== currentQuestion.id);
                }
                
                setTimeout(nextQuestion, 600);
            } else {
                // 不正解
                missCount++;
                
                // 間違えたリストに追加（まだ入っていなければ）
                if (!wrongWords.some(w => w.id === currentQuestion.id)) {
                    wrongWords.push(currentQuestion);
                }

                if (missCount >= 3) {
                    messageEl.textContent = `答えは「${currentQuestion.word}」でした。`;
                    messageEl.className = "msg error";
                    setTimeout(nextQuestion, 2000);
                } else {
                    const firstChar = currentQuestion.word.charAt(0);
                    messageEl.textContent = `不正解！ ヒント：一文字目は「${firstChar}」`;
                    messageEl.className = "msg hint";
                    inputEl.value = "";
                }
            }
        }
    });

    modeBtn.addEventListener('click', toggleMode);

    // 初期起動
    nextQuestion();
</script>
